<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bình Nước Cảm Xúc</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .bottle {
            width: 120px;
            height: 300px;
            border: 4px solid #333;
            border-radius: 10px 10px 30px 30px;
            position: relative;
            background-color: white;
            overflow: visible; 
            margin-top: 40px;
        }
        .bottle::before {
            /* Cổ bình */
            content: '';
            position: absolute;
            top: -40px;
            left: 26px;
            width: 60px;
            height: 40px;
            border: 4px solid #333;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            background-color: white;
        }
        .water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #3498db;
            border-radius: 0 0 26px 26px;
            transition: height 0.5s ease;
        }
        /* Hiệu ứng khi nước tràn */
        .overflow-spill {
            display: none;
            position: absolute;
            bottom: -20px;
            left: -40px;
            width: 200px;
            height: 30px;
            background-color: #3498db;
            border-radius: 50%;
            opacity: 0.8;
            animation: spill 1s forwards;
        }
        @keyframes spill {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .controls {
            margin-top: 60px;
            text-align: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #1a252f;
        }
        button:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #555;
        }
        .message {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 25px;
        }
        .reset-btn {
            margin-top: 30px;
            font-size: 13px;
            padding: 8px 16px;
            background-color: #bdc3c7;
            color: #333;
            box-shadow: none;
        }
        .reset-btn:hover {
            background-color: #95a5a6;
        }
    </style>
</head>
<body>

    <div class="bottle">
        <div class="water" id="water"></div>
        <div class="overflow-spill" id="spill"></div>
    </div>

    <div class="controls">
        <button onclick="addDrop()">Thêm 1 giọt buồn</button>
        <div class="status">Giọt thứ: <span id="countDisplay">0</span> / 100</div>
        <div class="message" id="message"></div>
        
        <!-- Nút reset phòng trường hợp bạn muốn làm lại -->
        <button class="reset-btn" onclick="resetBottle()">Đổ hết nước đi</button>
    </div>

    <script>
        // Kiểm tra xem trước đó đã lưu bao nhiêu giọt
        let count = localStorage.getItem('sadDrops') ? parseInt(localStorage.getItem('sadDrops')) : 0;

        const waterElement = document.getElementById('water');
        const countDisplay = document.getElementById('countDisplay');
        const messageDisplay = document.getElementById('message');
        const spillElement = document.getElementById('spill');

        // Hàm tạo âm thanh "tách"
        function playDropSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;

            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();

            osc.type = 'sine';
            // Tạo tần số âm thanh giống tiếng giọt nước rơi
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(1, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

            osc.connect(gainNode);
            gainNode.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // Cập nhật mức nước trên màn hình
        function updateUI() {
            countDisplay.innerText = count;

            if (count <= 100) {
                waterElement.style.height = count + '%';
                spillElement.style.display = 'none';
                
                if (count === 100) {
                    messageDisplay.innerText = 'Bình đã đầy...';
                    messageDisplay.style.color = '#e67e22';
                } else {
                    messageDisplay.innerText = '';
                }
            } else {
                // Xử lý khi tràn bình (Lần 101)
                waterElement.style.height = '100%';
                spillElement.style.display = 'block';
                messageDisplay.innerText = 'Giọt nước đã tràn ly. Đến lúc dừng lại rồi.';
                messageDisplay.style.color = '#e74c3c';
            }
        }

        // Sự kiện khi bấm nút
        function addDrop() {
            playDropSound();
            count++;
            localStorage.setItem('sadDrops', count); // Lưu vào bộ nhớ trình duyệt
            updateUI();
        }

        // Sự kiện làm lại từ đầu
        function resetBottle() {
            if (confirm('Bạn có chắc muốn đổ hết nước đi và cho người ấy thêm cơ hội?')) {
                count = 0;
                localStorage.setItem('sadDrops', count);
                updateUI();
            }
        }

        // Gọi hàm để hiển thị đúng mức nước khi vừa mở web
        updateUI();
    </script>
</body>
</html>
