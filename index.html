<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Nhỏ Của Hai Đứa v6.0</title>
    <style>
        :root { --bg-color: #f4f7f6; --text-color: #4a5568; --water-color: linear-gradient(180deg, #4ea8de, #2a6cb0); }
        body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; color: var(--text-color); }
        .container { display: grid; grid-template-columns: 260px 280px 280px 1fr; gap: 20px; max-width: 1400px; width: 100%; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 35px rgba(0,0,0,0.04); }
        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } }
        /* Các thành phần giao diện giữ nguyên như cũ để không làm hỏng layout */
        .left-panel, .middle-panel, .right-panel, .map-panel { display: flex; flex-direction: column; gap: 15px; border-right: 2px dashed #edf2f7; padding-right: 15px; }
        .bottle-body { width: 160px; height: 230px; border: 4px solid #cbd5e1; border-radius: 20px 20px 35px 35px; position: relative; background: rgba(255, 255, 255, 0.5); overflow: hidden; margin: 10px auto; }
        .water { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--water-color); transition: height 0.6s ease; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 20px; background: #ff9a9e; color: white; font-weight: bold; }
        .weather-frame-box iframe { width: 100%; height: 60px; border: none; }
        textarea { width: 100%; height: 100px; resize: none; border: 1px solid #ddd; border-radius: 8px; }
        .map-container { width: 100%; height: 300px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="bottle-body"><div class="water" id="water"></div></div>
        <button onclick="addDrop()">Thêm 1 giọt buồn 💧</button>
        <button onclick="addMiss()">Chấm 1 cái vì nhớ ❤️</button>
        <p>Giọt nước: <span id="countDisplay">0</span>/100</p>
        <div class="weather-panel">
            <p>Thời tiết:</p>
            <div class="weather-frame-box"><iframe id="frameWeather1" src="https://wttr.in/Tuyen_Quang?format=4&lang=vi"></iframe></div>
            <div class="weather-frame-box"><iframe id="frameWeather2" src="https://wttr.in/Ho_Chi_Minh?format=4&lang=vi"></iframe></div>
        </div>
    </div>

    <div class="middle-panel">
        <textarea id="stickyNote" placeholder="Ghi chú..." oninput="saveNote()"></textarea>
        <ul id="historyList"></ul>
    </div>

    <div class="right-panel">
        <div id="loveCounter">Thời gian: <span id="d-days">0</span> ngày</div>
        <div id="eventsList"></div>
    </div>

    <div class="map-panel">
        <div class="map-container" id="mapContainer"></div>
        <button onclick="setLocations()">Cài đặt vị trí</button>
    </div>
</div>

<script>
    let count = parseInt(localStorage.getItem('sadDrops') || 0);
    let myLoc = localStorage.getItem('myLocation') || "Tuyen_Quang";
    let loverLoc = localStorage.getItem('loverLocation') || "Ho_Chi_Minh";

    function addDrop() {
        count++;
        localStorage.setItem('sadDrops', count);
        document.getElementById('countDisplay').innerText = count;
        document.getElementById('water').style.height = (count % 100) + '%';
    }

    function addMiss() { alert("Đã gửi đi một cái ôm!"); }

    function saveNote() { localStorage.setItem('stickyNoteData', document.getElementById('stickyNote').value); }

    function setLocations() {
        myLoc = prompt("Nhập thành phố của bạn:", myLoc) || myLoc;
        loverLoc = prompt("Nhập thành phố người ấy:", loverLoc) || loverLoc;
        localStorage.setItem('myLocation', myLoc);
        localStorage.setItem('loverLocation', loverLoc);
        updateMap();
    }

    function updateMap() {
        // Link chuẩn của Google Maps để nhúng
        const url = `https://www.google.com/maps/embed/v1/directions?key=YOUR_API_KEY&origin=${myLoc}&destination=${loverLoc}`;
        document.getElementById('mapContainer').innerHTML = `<iframe src="${url}" width="100%" height="100%"></iframe>`;
    }

    // Khởi tạo
    document.getElementById('stickyNote').value = localStorage.getItem('stickyNoteData') || "";
    document.getElementById('countDisplay').innerText = count;
    document.getElementById('water').style.height = (count % 100) + '%';
    updateMap();
</script>
</body>
</html>
